name: Publish to npm

# Publishes @markhuot/codewalk on a version tag using npm Trusted Publishing
# (OIDC) — no NPM_TOKEN. It works once a Trusted Publisher is configured on the
# npm package pointing at this repo + workflow (npmjs.com → package Settings →
# Trusted Publisher). id-token: write lets npm authenticate the run and attach
# provenance automatically.
on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-version 24 ships an npm new enough for OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Tag must match package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      # `npm publish` runs prepublishOnly first (build + typecheck + tests), then
      # authenticates via OIDC — no token needed.
      - name: Publish
        run: npm publish --access public
