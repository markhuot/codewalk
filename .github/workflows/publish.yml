name: Publish to npm

# Publishes @markhuot/codewalk whenever a version tag (v1.2.3) is pushed.
# Requires a repo secret NPM_TOKEN — an npm "automation" access token, which
# bypasses the interactive 2FA prompt that a normal publish requires.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Tag must match package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # `npm publish` runs the prepublishOnly hook first (build + typecheck + tests),
      # so a broken build or failing test blocks the release.
      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
