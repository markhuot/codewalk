name: Publish to npm

# Publishes @markhuot/codewalk using npm Trusted Publishing (OIDC) — no token.
# The git tag is the source of truth for the version: package.json ships a
# placeholder (0.0.0) and CI stamps the real version from the tag before
# publishing. Requires a Trusted Publisher configured on the npm package
# (npmjs.com → package Settings → Trusted Publisher) pointing at this
# repo + publish.yml. id-token: write lets npm authenticate the run and attach
# provenance automatically.
on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.1)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # node-version 24 ships an npm new enough for OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve version from tag or input
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Stamp package.json version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # `npm publish` runs prepublishOnly first (build + typecheck + tests), then
      # authenticates via OIDC — no token needed.
      - name: Publish
        run: npm publish --access public
